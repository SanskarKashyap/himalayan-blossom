<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>View Cart — Himalayan Blossom</title>
  <meta name="description"
    content="Review the products in your Himalayan Blossom cart, adjust quantities in real time, and proceed to checkout when you are ready." />
  <meta name="keywords" content="Himalayan Blossom cart, honey cart, checkout, Himalayan honey" />

  <!-- Favicons -->
  <link href="assets/img/favicon.png" rel="icon" />
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Amatic+SC:wght@400;700&display=swap"
    rel="stylesheet" />

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
  <link href="assets/vendor/aos/aos.css" rel="stylesheet" />
  <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet" />
  <link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet" />

  <!-- Main CSS File -->
  <link href="assets/css/main.css" rel="stylesheet" />
  <script src="assets/js/env-loader.js"></script>
  <script src="assets/js/app-config.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Razorpay script removed -->
</head>

<body class="cart-page" data-page-id="cart">
  <div id="hbHeaderHost" data-include="partials/navbar.html"></div>

  <main class="main" style="min-height: 50vh; display: flex; align-items: center; justify-content: center;">
    <div class="text-center">
      <h2>Opening your cart...</h2>
      <script>
        setTimeout(() => {
          const btn = document.getElementById('headerCartButton');
          if (btn) btn.click();
          else window.location.replace('index.html');
        }, 500);
      </script>
    </div>
  </main>
  <div id="hbFooterHost" data-include="partials/footer.html"></div>

  <!-- Scroll Top -->
  <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center">
    <i class="bi bi-arrow-up-short"></i>
  </a>

  <!-- Preloader -->
  <div id="preloader"></div>

  <!-- Vendor JS Files -->
  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/vendor/aos/aos.js"></script>
  <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="assets/vendor/swiper/swiper-bundle.min.js"></script>

  <!-- Main JS File -->
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/site.js"></script>
  <script src="assets/js/content.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/checkout.js"></script>
</body>

</html>
